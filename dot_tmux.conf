# ~/.tmux.conf

##### 1) 長いログを扱う（Claude Code 等で効く）
# man にある history-limit でウィンドウ履歴を増やす
set -g history-limit 100000

##### 2) マウス操作（スクロール/ペイン選択）
set -g mouse on

##### 2.5) ウィンドウサイズを現在のクライアントに合わせる
setw -g aggressive-resize on

##### 3) コピーモード/ステータス操作を vi 風に
setw -g mode-keys vi
set -g status-keys vi

##### 4) クリップボード連携（安全寄り）
# tmux 公式Wikiの Security concerns に沿い、まずは external 推奨。
# external: tmux 自身は外部クリップボード設定を試みるが、
#           "tmux内の任意アプリが外部クリップボードを書き換える" リスクを抑える。
set -g set-clipboard external

# もし「tmux内でコピーしたものが必ずOSクリップボードに載ってほしい」用途で、
# かつ tmux 内で実行するコマンドを信頼できるなら、以下に切替える選択肢もある。
# （公式Wikiにリスクが明記されているので、理解した上で）
# set -g set-clipboard on

##### 5) Prefix を Ctrl+t に変更
unbind C-b
set -g prefix C-t
bind C-t send-prefix

##### 6) ペイン分割を直感的に
bind - split-window -v
bind | split-window -h

##### 7) ペイン移動を vim 風に (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### 8) ペイン均等リサイズ
bind = select-layout even-horizontal
bind + select-layout even-vertical

##### 9) vi 風コピーバインド + macOS クリップボード連携
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

##### 10) ペインボーダーの視認性向上
# アクティブペインのボーダーを目立たせる
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=green,bold'

# ボーダー上部にペイン情報を表示
set -g pane-border-status top
set -g pane-border-format ' #P: #{pane_current_command} '

##### 11) Hyperlink (OSC 8) support
set -ga terminal-features ",*:hyperlinks"
set -g allow-passthrough on
